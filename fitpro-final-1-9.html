// ── UI Components ──────────────────────────────────────────────────────────────
const Btn = ({ children, onClick, variant = "primary", size = "md", disabled, style }) => {
  const vs = {
    primary: { background: `linear-gradient(135deg,${C.accent},${C.accentDim})`, color: "#000", border: "none" },
    ghost: { background: "transparent", color: C.accent, border: `1px solid ${C.border}` },
    danger: { background: "transparent", color: C.red, border: `1px solid ${C.red}33` },
    dark: { background: C.card, color: C.text, border: `1px solid ${C.border}` },
  };
  const ss = { sm: "5px 11px", md: "10px 20px", lg: "13px 28px" };
  return <button onClick={onClick} disabled={disabled} style={{ ...vs[variant], padding: ss[size], borderRadius: 8, fontWeight: 600, fontSize: size === "sm" ? 12 : 14, letterSpacing: "0.5px", transition: "all 0.2s", opacity: disabled ? 0.5 : 1, ...(style || {}) }}>{children}</button>;
};

const Inp = ({ label, value, onChange, placeholder, type = "text", style }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <div style={{ fontSize: 11, color: C.muted, marginBottom: 5, fontWeight: 600, letterSpacing: "0.5px", textTransform: "uppercase" }}>{label}</div>}
    <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 13px", color: C.text, fontSize: 14, outline: "none", ...(style || {}) }}
      onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
  </div>
);

const Modal = ({ open, onClose, title, children, width = 480 }) => {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={onClose}>
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, width, maxWidth: "100%", maxHeight: "90vh", overflow: "auto", padding: 26 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22 }}>
          <div style={{ fontFamily: font, fontSize: 17, color: C.accent }}>{title}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, fontSize: 20 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
};

// ── Profile Page ───────────────────────────────────────────────────────────────
const ProfilePage = ({ username, onBack }) => {
  const [templateImg, setTemplateImg] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [msg, setMsg] = useState("");


  useEffect(() => {
    const db = window._firebaseDB;
    if (!db) return;
    db.ref("fitpro_users/" + username + "/templateImg").once("value").then(snap => {
      if (snap.val()) setTemplateImg(snap.val());
    });
  }, []);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 1.5 * 1024 * 1024) { setMsg("❌ حجم عکس باید کمتر از ۱.۵ مگابایت باشه"); return; }
    setUploading(true); setMsg("");
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const base64 = ev.target.result;
      const db = window._firebaseDB;
      await db.ref("fitpro_users/" + username + "/templateImg").set(base64);
      window._userTemplateImg = base64;
      setTemplateImg(base64);
      setUploading(false);
      setMsg("✅ قالب ذخیره شد!");
      setTimeout(() => setMsg(""), 3000);
    };
    reader.readAsDataURL(file);
  };

  const removeTemplate = async () => {
    await window._firebaseDB.ref("fitpro_users/" + username + "/templateImg").remove();
    window._userTemplateImg = null;
    setTemplateImg(null);
    setMsg("قالب حذف شد");
    setTimeout(() => setMsg(""), 2000);
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: 24 }}>
      <div style={{ maxWidth: 500, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
          <button onClick={onBack} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "7px 13px", color: C.muted, fontSize: 18 }}>←</button>
          <h1 style={{ fontFamily: font, fontSize: 22, color: C.accent }}>🖼 قالب اختصاصی</h1>
        </div>

        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 24, marginBottom: 16 }}>
          <div style={{ color: C.mutedLight, fontSize: 13, lineHeight: 1.9, marginBottom: 20 }}>
            یه تصویر آپلود کن که بالا و پایینش لوگو یا اطلاعات داشته باشه.<br/>
            <span style={{ color: C.accent }}>برنامه ورزشی روی این تصویر رندر میشه.</span><br/>
            <span style={{ color: C.muted, fontSize: 11 }}>حداکثر ۱.۵ مگابایت · JPG یا PNG</span>
          </div>

          {templateImg ? (
            <div>
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>پیش‌نمایش قالب فعلی:</div>
              <img src={templateImg} alt="template" style={{ width: "100%", borderRadius: 10, border: `1px solid ${C.border}`, maxHeight: 280, objectFit: "contain", background: "#fff" }} />
              <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
                <label style={{ flex: 1, cursor: "pointer" }}>
                  <Btn style={{ width: "100%", display: "block", textAlign: "center" }}>🔄 تغییر تصویر</Btn>
                  <input type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
                </label>
                <Btn variant="danger" onClick={removeTemplate}>🗑 حذف</Btn>
              </div>
            </div>
          ) : (
            <label style={{ display: "block", cursor: "pointer" }}>
              <div style={{ border: `2px dashed ${C.border}`, borderRadius: 12, padding: "32px 20px", textAlign: "center", transition: "all 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = C.accent}
                onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>📁</div>
                <div style={{ color: C.accent, fontWeight: 600, marginBottom: 4 }}>کلیک کن یا تصویر رو اینجا بکش</div>
                <div style={{ color: C.muted, fontSize: 12 }}>JPG · PNG · حداکثر ۱.۵MB</div>
              </div>
              <input type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
            </label>
          )}

          {uploading && <div style={{ color: C.accent, fontSize: 13, marginTop: 12, textAlign: "center" }}>⏳ در حال ذخیره...</div>}
          {msg && <div style={{ color: msg.startsWith("❌") ? C.red : C.green, fontSize: 13, marginTop: 12, textAlign: "center" }}>{msg}</div>}
        </div>


        </div>
      </div>
    </div>
  );
};

// ── Movements Page ─────────────────────────────────────────────────────────────
const MovementsPage = ({ data, setData, onBack }) => {
  const [activeTab, setActiveTab] = useState(data.movementTabs[0]?.id || "");
  const [showAddTab, setShowAddTab] = useState(false);
  const [newTabName, setNewTabName] = useState("");
  const [showAddMove, setShowAddMove] = useState(false);
  const [moveForm, setMoveForm] = useState({ name: "", tabId: "", subCategory: "", note: "" });
  const tabMoves = (data.movements||[]).filter(m => m.tabId === activeTab);
  const addTab = () => {
    if (!newTabName.trim()) return;
    const tab = { id: uid(), name: newTabName.trim() };
    setData(d => ({ ...d, movementTabs: [...(d.movementTabs||[]), tab] }));
    setActiveTab(tab.id); setNewTabName(""); setShowAddTab(false);
  };
  const deleteTab = (id) => {
    if ((data.movementTabs||[]).length <= 1) return;
    setData(d => ({ ...d, movementTabs: (d.movementTabs||[]).filter(t => t.id !== id), movements: (d.movements||[]).filter(m => m.tabId !== id) }));
    if (activeTab === id) { const rem = data.movementTabs.filter(t => t.id !== id); setActiveTab(rem[0]?.id || ""); }
  };
  const addMovement = () => {
    if (!moveForm.name.trim()) return;
    setData(d => ({ ...d, movements: [...(d.movements||[]), { id: uid(), ...moveForm, tabId: moveForm.tabId || activeTab }] }));
    setMoveForm({ name: "", tabId: "", subCategory: "", note: "" }); setShowAddMove(false);
  };
  return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: 24 }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
          <button onClick={onBack} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "7px 13px", color: C.muted, fontSize: 18 }}>←</button>
          <h1 style={{ fontFamily: font, fontSize: 26, color: C.accent }}>🏋️ لیست حرکات</h1>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20, alignItems: "center" }}>
          {(data.movementTabs||[]).map(tab => (
            <div key={tab.id} style={{ position: "relative" }}>
              <button onClick={() => setActiveTab(tab.id)} style={{ background: activeTab === tab.id ? `linear-gradient(135deg,${C.accent},${C.accentDim})` : C.card, color: activeTab === tab.id ? "#000" : C.text, border: `1px solid ${activeTab === tab.id ? C.accent : C.border}`, borderRadius: 8, padding: "7px 16px", fontWeight: 600, fontSize: 13, paddingRight: 28 }}>{tab.name}</button>
              <button onClick={() => deleteTab(tab.id)} style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: activeTab === tab.id ? "#0008" : C.muted, fontSize: 11 }}>✕</button>
            </div>
          ))}
          <button onClick={() => setShowAddTab(true)} style={{ background: "none", border: `1px dashed ${C.border}`, borderRadius: 8, color: C.muted, padding: "7px 14px", fontSize: 13 }}>+ تب جدید</button>
        </div>
        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, overflow: "hidden" }}>
          <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontFamily: font, color: C.accent, fontSize: 14 }}>{(data.movementTabs||[]).find(t => t.id === activeTab)?.name} <span style={{ color: C.muted, fontSize: 12 }}>({tabMoves.length})</span></span>
            <Btn size="sm" onClick={() => { setMoveForm({ name: "", tabId: activeTab, subCategory: "", note: "" }); setShowAddMove(true); }}>+ افزودن حرکت</Btn>
          </div>
          {tabMoves.length === 0 ? <div style={{ padding: 36, textAlign: "center", color: C.muted }}>هنوز حرکتی ثبت نشده</div> :
            tabMoves.map((m, i) => (
              <div key={m.id} style={{ padding: "12px 18px", borderBottom: i < tabMoves.length - 1 ? `1px solid ${C.border}` : "none", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 600, marginBottom: 2 }}>{m.name}</div>
                  {m.subCategory && <div style={{ fontSize: 12, color: C.accent }}>زیردسته: {m.subCategory}</div>}
                  {m.note && <div style={{ fontSize: 12, color: C.muted }}>{m.note}</div>}
                </div>
                <button onClick={() => setData(d => ({ ...d, movements: d.movements.filter(x => x.id !== m.id) }))} style={{ background: "none", border: "none", color: C.red }}>🗑</button>
              </div>
            ))}
        </div>
      </div>
      <Modal open={showAddTab} onClose={() => setShowAddTab(false)} title="تب جدید" width={360}>
        <Inp label="نام دسته بندی" value={newTabName} onChange={setNewTabName} placeholder="مثل: ساق پا" /><Btn onClick={addTab}>ذخیره</Btn>
      </Modal>
      <Modal open={showAddMove} onClose={() => setShowAddMove(false)} title="افزودن حرکت">
        <Inp label="نام حرکت" value={moveForm.name} onChange={v => setMoveForm(f => ({ ...f, name: v }))} placeholder="مثل: فلای معکوس" />
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 5, fontWeight: 600, textTransform: "uppercase" }}>دسته بندی عضله</div>
          <select value={moveForm.tabId || activeTab} onChange={e => setMoveForm(f => ({ ...f, tabId: e.target.value }))} style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 13px", color: C.text, fontSize: 14, outline: "none" }}>
            {(data.movementTabs||[]).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </div>
        <Inp label="زیر دسته (اختیاری)" value={moveForm.subCategory} onChange={v => setMoveForm(f => ({ ...f, subCategory: v }))} placeholder="مثل: سرشانه پشت" />
        <Inp label="یادداشت (اختیاری)" value={moveForm.note} onChange={v => setMoveForm(f => ({ ...f, note: v }))} placeholder="توضیحات..." />
        <Btn onClick={addMovement}>ذخیره حرکت</Btn>
      </Modal>
    </div>
  );
};

// ── Foods Page ─────────────────────────────────────────────────────────────────
const FoodsPage = ({ data, setData, onBack }) => {

  const [activeCat, setActiveCat] = useState((data.foodCategories)[0]?.id || "");

  const [foodForm, setFoodForm] = useState({ name: "", categoryId: "", unit: "گرم", caloriePerUnit: "", proteinPerUnit: "" });
  const catFoods = (data.foods||[]).filter(f => f.categoryId === activeCat);
  const addCat = () => {
    if (!newCatName.trim()) return;
    const cat = { id: uid(), name: newCatName.trim() };
    setData(d => ({ ...d, foodCategories: [...(d.foodCategories||[]), cat] }));
    setActiveCat(cat.id); setNewCatName(""); setShowAddCat(false);
  };
  const deleteCat = (id) => {
    if ((data.foodCategories||[]).length <= 1) return;
    const remaining = (data.foodCategories||[]).filter(c => c.id !== id);
    setData(d => ({ ...d, foodCategories: remaining, foods: (d.foods||[]).filter(f => f.categoryId !== id) }));
    if (activeCat === id) setActiveCat(remaining[0]?.id || "");
  };
  const addFood = () => {
    if (!foodForm.name.trim()) return;
    setData(d => ({ ...d, foods: [...(d.foods||[]), { id: uid(), ...foodForm, categoryId: foodForm.categoryId || activeCat, caloriePerUnit: Number(foodForm.caloriePerUnit) || 0, proteinPerUnit: Number(foodForm.proteinPerUnit) || 0 }] }));
    setFoodForm({ name: "", categoryId: "", unit: "گرم", caloriePerUnit: "", proteinPerUnit: "" }); setShowAddFood(false);

      <div style={{ maxWidth: 800, margin: "0 auto" }}>

          {(data.foodCategories||[]).map(cat => (
            <div key={cat.id} style={{ position: "relative" }}>
              <button onClick={() => setActiveCat(cat.id)} style={{ background: activeCat === cat.id ? `linear-gradient(135deg,${C.accent},${C.accentDim})` : C.card, color: activeCat === cat.id ? "#000" : C.text, border: `1px solid ${activeCat === cat.id ? C.accent : C.border}`, borderRadius: 8, padding: "7px 16px", fontWeight: 600, fontSize: 13, paddingRight: 28 }}>{cat.name}</button>
              <button onClick={() => deleteCat(cat.id)} style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: activeCat === cat.id ? "#0008" : C.muted, fontSize: 11 }}>✕</button>
            </div>
          ))}
          <button onClick={() => setShowAddCat(true)} style={{ background: "none", border: `1px dashed ${C.border}`, borderRadius: 8, color: C.muted, padding: "7px 14px", fontSize: 13 }}>+ دسته جدید</button>
        </div>
        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, overflow: "hidden" }}>
          <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>

            <Btn size="sm" onClick={() => { setFoodForm({ name: "", categoryId: activeCat, unit: "گرم", caloriePerUnit: "", proteinPerUnit: "" }); setShowAddFood(true); }}>+ افزودن غذا</Btn>

              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead><tr style={{ background: C.surface }}>{["نام", "واحد", "کالری/واحد", "پروتئین/واحد", ""].map(h => <th key={h} style={{ padding: "9px 14px", fontSize: 11, color: C.muted, textAlign: "right", fontWeight: 600 }}>{h}</th>)}</tr></thead>

                    <td style={{ padding: "11px 14px", color: C.muted }}>{f.unit}</td>

                    <td style={{ padding: "11px 14px", color: C.blue }}>{f.proteinPerUnit}g</td>

  );
};

// ── buildFullHtml ──────────────────────────────────────────────────────────────
function buildFullHtml(ath, pt, trainingDays, nutritionMeals, tCal, tProt, theme = 'gold') {
  const totalMealCal = nutritionMeals.reduce((s, m) => s + m.items.reduce((ss, i) => ss + i.cal, 0), 0);
  const totalMealProt = nutritionMeals.reduce((s, m) => s + m.items.reduce((ss, i) => ss + i.prot, 0), 0);

  const themes = {
    gold: {
      primary: '#7c5c00', accent: '#b8860b', accentLight: '#e0c97a',
      bg: '#ffffff', cardBg: '#fdf8ee', cardBorder: '#e0c97a',
      headerGrad: 'linear-gradient(135deg,#fdf3d0,#fef9ec)',
      tableHead: '#f9f5e7', tableHeadColor: '#999', tableAlt: '#fafafa',
      macroBar: '#fdf8ee', text: '#333', footerBorder: '#eee',
      borderLine: 'linear-gradient(90deg,transparent,#b8860b,transparent)',
      logoColor: '#7c5c00', font: 'Vazirmatn',
    },
    dark: {
      primary: '#e8c96d', accent: '#e8c96d', accentLight: '#3a3000',
      bg: '#0f1117', cardBg: '#181c24', cardBorder: '#2a2f40',
      headerGrad: 'linear-gradient(135deg,#1e2235,#252a3a)',
      tableHead: '#111318', tableHeadColor: '#6b7280', tableAlt: '#13161f',
      macroBar: '#181c24', text: '#d1d5db', footerBorder: '#2a2f40',
      borderLine: 'linear-gradient(90deg,transparent,#e8c96d,transparent)',
      logoColor: '#e8c96d', font: 'Vazirmatn',
    },
    blue: {
      primary: '#1e3a5f', accent: '#2563eb', accentLight: '#bfdbfe',
      bg: '#ffffff', cardBg: '#eff6ff', cardBorder: '#bfdbfe',
      headerGrad: 'linear-gradient(135deg,#dbeafe,#eff6ff)',
      tableHead: '#f0f7ff', tableHeadColor: '#6b7280', tableAlt: '#f8faff',
      macroBar: '#eff6ff', text: '#1e3a5f', footerBorder: '#bfdbfe',
      borderLine: 'linear-gradient(90deg,transparent,#2563eb,transparent)',
      logoColor: '#1e3a5f', font: 'Vazirmatn',
    },
    green: {
      primary: '#14532d', accent: '#16a34a', accentLight: '#bbf7d0',
      bg: '#ffffff', cardBg: '#f0fdf4', cardBorder: '#bbf7d0',
      headerGrad: 'linear-gradient(135deg,#dcfce7,#f0fdf4)',
      tableHead: '#f0fdf4', tableHeadColor: '#6b7280', tableAlt: '#f7fef9',
      macroBar: '#f0fdf4', text: '#166534', footerBorder: '#bbf7d0',
      borderLine: 'linear-gradient(90deg,transparent,#16a34a,transparent)',
      logoColor: '#14532d', font: 'Vazirmatn',
    },
    red: {
      primary: '#7f1d1d', accent: '#dc2626', accentLight: '#fecaca',
      bg: '#ffffff', cardBg: '#fff5f5', cardBorder: '#fecaca',
      headerGrad: 'linear-gradient(135deg,#fee2e2,#fff5f5)',
      tableHead: '#fff0f0', tableHeadColor: '#6b7280', tableAlt: '#fffafa',
      macroBar: '#fff5f5', text: '#7f1d1d', footerBorder: '#fecaca',
      borderLine: 'linear-gradient(90deg,transparent,#dc2626,transparent)',
      logoColor: '#7f1d1d', font: 'Vazirmatn',
    },
  };
  const T = themes[theme] || themes.gold;

  const repsDisplay = (ex) => {
    if (ex.customReps && ex.customReps.length > 0) return ex.customReps.join(" / ");
    return ex.reps;
  };
  const setTypeLabel = (ex) => {
    if (ex.setType === "superset") return "🔗 سوپرست";
    if (ex.setType === "dropset") return "📉 دراپ ست";
    return "";
  };

  let trainingSection = "";
  if (pt !== "nutrition" && trainingDays.length > 0) {
    trainingSection = `<div class="section-title">🏋️ برنامه تمرینی</div>
    ${trainingDays.map(d => `<div class="day-card"><div class="day-header">روز ${d.day}</div>
    <table class="ex-table"><thead><tr><th>حرکت</th><th>دسته بندی</th><th>ست</th><th>تکرار</th><th>یادداشت</th></tr></thead><tbody>
    ${d.exercises.map(e => {
      let nameCell = e.name;
      let repsCell = repsDisplay(e);
      let noteCell = e.note || "-";
      if (e.setType === "superset" && e.superName) {
        nameCell = `🔗 ${e.name}<br><span style="color:#5b9cf6;font-size:11px">+ ${e.superName}</span>`;
        repsCell = `${repsDisplay(e)}<br><span style="color:#5b9cf6">${e.superCustomReps?.length > 0 ? e.superCustomReps.join("/") : e.superReps}</span>`;
      }
      if (e.setType === "dropset" && e.dropWeights?.length > 0) {
        const dropLabel = e.lastSetDrop ? "📉 ست آخر: " : "📉 ";
        noteCell = dropLabel + e.dropWeights.map((w,i)=>w||`مرحله ${i+1}`).join(" → ") + (e.note ? " | " + e.note : "");
      }
      return `<tr><td>${nameCell}</td><td>${e.tabName}</td><td>${e.sets}</td><td>${repsCell}</td><td>${noteCell}</td></tr>`;
    }).join("")}
    </tbody></table></div>`).join("")}`;
  }

  let nutritionSection = "";
  if (pt !== "training" && nutritionMeals.length > 0) {
    nutritionSection = `<div class="section-title" style="margin-top:28px">🥗 برنامه تغذیه</div>
    <div class="macro-bar"><span>هدف: <b>${tCal}</b> / <b>${tProt}</b></span><span>مصرف: <b>${totalMealCal.toFixed(0)}</b> / <b>${totalMealProt.toFixed(1)}</b></span></div>
    ${nutritionMeals.map(m => `<div class="day-card"><div class="day-header">وعده ${m.meal}</div>
    <table class="ex-table"><thead><tr><th>غذا</th><th>مقدار</th><th>واحد</th><th>کالری</th><th>پروتئین</th></tr></thead><tbody>
    ${m.items.map(i => `<tr><td>${i.name}</td><td>${i.amount}</td><td>${i.unit}</td><td>${i.cal.toFixed(0)}</td><td>${i.prot.toFixed(1)}</td></tr>`).join("")}
    </tbody></table></div>`).join("")}`;
  }

  return `<!DOCTYPE html><html dir="rtl" lang="fa"><head><meta charset="UTF-8"><title>FIT PRO - ${ath.name}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
@page{size:A4;margin:12mm}
body{font-family:'Vazirmatn',sans-serif;background:${T.bg};color:${T.text};direction:rtl}
.page{width:100%;max-width:780px;margin:0 auto;padding:20px}
.border-line{height:4px;background:${T.borderLine};border-radius:3px;margin:12px 0}
.logo{text-align:center;padding:6px 0 10px}
.logo-title{font-size:30px;font-weight:900;color:${T.logoColor};letter-spacing:6px}
.logo-sub{font-size:10px;color:${T.tableHeadColor};letter-spacing:3px;margin-top:3px}
.athlete-box{background:${T.cardBg};border:1px solid ${T.cardBorder};border-radius:10px;padding:12px 16px;margin-bottom:18px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
.athlete-item{text-align:center}
.athlete-label{font-size:9px;color:${T.tableHeadColor};text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.athlete-value{font-size:14px;font-weight:700;color:${T.primary}}
.section-title{font-size:15px;font-weight:700;color:${T.primary};border-bottom:2px solid ${T.accentLight};padding-bottom:6px;margin-bottom:12px}
.day-card{margin-bottom:14px;background:${T.bg};border-radius:8px;overflow:hidden;border:1px solid ${T.cardBorder};box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.day-header{background:${T.headerGrad};color:${T.primary};font-weight:700;padding:8px 14px;font-size:13px;border-bottom:1px solid ${T.cardBorder}}
.ex-table{width:100%;border-collapse:collapse}
.ex-table th{background:${T.tableHead};color:${T.tableHeadColor};font-size:10px;padding:7px 11px;text-align:right;font-weight:600;border-bottom:1px solid ${T.footerBorder}}
.ex-table td{padding:8px 11px;font-size:12px;border-top:1px solid ${T.footerBorder};color:${T.text}}
.ex-table tr:nth-child(even) td{background:${T.tableAlt}}
.macro-bar{display:flex;justify-content:space-between;background:${T.macroBar};border:1px solid ${T.cardBorder};border-radius:7px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:${T.text}}
.macro-bar b{color:${T.primary}}
.footer{text-align:center;margin-top:14px;font-size:10px;color:${T.tableHeadColor};letter-spacing:2px;padding-top:8px;border-top:1px solid ${T.footerBorder}}
@media print{
  body{background:${T.bg} !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .page{padding:0}
}
</style></head><body>
<div class="page">
  <div class="border-line"></div>
  <div class="logo"><div class="logo-title">FIT PRO</div><div class="logo-sub">برنامه اختصاصی ورزشکار</div></div>
  <div class="athlete-box">
    <div class="athlete-item"><div class="athlete-label">نام</div><div class="athlete-value">${ath.name}</div></div>
    <div class="athlete-item"><div class="athlete-label">سن</div><div class="athlete-value">${ath.age}</div></div>
    <div class="athlete-item"><div class="athlete-label">قد</div><div class="athlete-value">${ath.height}</div></div>
    <div class="athlete-item"><div class="athlete-label">وزن</div><div class="athlete-value">${ath.weight}</div></div>
    <div class="athlete-item"><div class="athlete-label">هدف</div><div class="athlete-value" style="font-size:12px">${ath.goal}</div></div>
    ${ath.waist  ? `<div class="athlete-item"><div class="athlete-label">دور کمر</div><div class="athlete-value">${ath.waist} cm</div></div>` : ""}
    ${ath.arm    ? `<div class="athlete-item"><div class="athlete-label">دور بازو</div><div class="athlete-value">${ath.arm} cm</div></div>` : ""}
    ${ath.chest  ? `<div class="athlete-item"><div class="athlete-label">دور سینه</div><div class="athlete-value">${ath.chest} cm</div></div>` : ""}
    ${(ath.customFields||[]).map(f => f.label&&f.value ? `<div class="athlete-item"><div class="athlete-label">${f.label}</div><div class="athlete-value" style="font-size:12px">${f.value}</div></div>` : "").join("")}
  </div>
  ${trainingSection}${nutritionSection}
  <div class="border-line"></div>
  <div class="footer">FIT PRO &nbsp;|&nbsp; ${ath.fullName || ath.name}</div>
</div>
</body></html>`;
}

// ── Program Wizard ─────────────────────────────────────────────────────────────
const ProgramWizard = ({ data, onBack }) => {
  const [step, setStep] = useState("athlete");
  const [athlete, setAthlete] = useState({ name: "", age: "", height: "", weight: "", goal: "", fullName: window._userFullName || "" });
  const [customFields, setCustomFields] = useState([]); // [{label, value}]
  const [progType, setProgType] = useState("");

  // Training
  const [numDays, setNumDays] = useState(3);
  const [currentDay, setCurrentDay] = useState(1);
  const [allDays, setAllDays] = useState([]);
  const [dayExercises, setDayExercises] = useState([]);
  const [lastTabId, setLastTabId] = useState((data.movementTabs||[])[0]?.id || "");
  const [exForm, setExForm] = useState({ tabId: (data.movementTabs||[])[0]?.id || "", movementId: "", sets: 3, reps: 10, customMode: false, customReps: [], note: "", setType: "normal", superMovementId: "", superReps: 10, superCustomMode: false, superCustomReps: [], dropWeights: [""], lastSetDrop: false });

  // Nutrition
  const [numMeals, setNumMeals] = useState(3);
  const [targetCal, setTargetCal] = useState(2000);
  const [targetProt, setTargetProt] = useState(150);
  const [currentMeal, setCurrentMeal] = useState(1);
  const [allMeals, setAllMeals] = useState([]);
  const [mealItems, setMealItems] = useState([]);
  const [lastCatId, setLastCatId] = useState((data.foodCategories||[])[0]?.id || "");
  const [mealItemForm, setMealItemForm] = useState({ categoryId: (data.foodCategories||[])[0]?.id || "", foodId: "", amount: 100 });
  const [showAddMealItem, setShowAddMealItem] = useState(false);

  // Output
  const [docHtml, setDocHtml] = useState("");
  const [selectedTheme, setSelectedTheme] = useState("gold");

  // ── custom reps sync ──
  const syncCustomReps = (sets, prev) => {
    const arr = Array.from({ length: sets }, (_, i) => prev[i] ?? 10);
    return arr;
  };

  const pickerTabMoves = (data.movements||[]).filter(m => m.tabId === exForm.tabId);

  const addExercise = () => {
    const tab = (data.movementTabs||[]).find(t => t.id === exForm.tabId);
    const move = data.movements.find(m => m.id === exForm.movementId);
    if (!move) return;
    const ex = {
      tabId: exForm.tabId, tabName: tab?.name || "",
      movementId: exForm.movementId, name: move.name,
      sets: exForm.sets,
      reps: exForm.customMode ? "custom" : exForm.reps,
      customReps: exForm.customMode ? [...exForm.customReps] : [],
      note: exForm.note,
      setType: exForm.setType,
    };
    if (exForm.setType === "superset") {
      const superMove = data.movements.find(m => m.id === exForm.superMovementId);
      if (!superMove) { return; }
      ex.superName = superMove.name;
      ex.superReps = exForm.superCustomMode ? "custom" : exForm.superReps;
      ex.superCustomReps = exForm.superCustomMode ? [...exForm.superCustomReps] : [];
    }
    if (exForm.setType === "dropset") {
      ex.dropWeights = exForm.dropWeights.map(w => w.trim());
      ex.lastSetDrop = exForm.lastSetDrop || false;
    }
    setDayExercises(prev => [...prev, ex]);
    setLastTabId(exForm.tabId);
    setExForm(f => ({ ...f, movementId: "", note: "", customMode: false, customReps: [], setType: "normal", superMovementId: "", superReps: 10, superCustomMode: false, superCustomReps: [], dropWeights: [""], lastSetDrop: false }));
  };

  const endDay = () => {
    const finished = [...allDays, { day: currentDay, exercises: dayExercises }];
    setAllDays(finished);
    if (currentDay < numDays) {
      setCurrentDay(d => d + 1);
      setDayExercises([]);
      setExForm(f => ({ ...f, movementId: "", note: "" }));
    } else {
      if (progType === "both") setStep("nutrition_setup");
      else { setAllDays(finished); setStep("theme_pick"); }
    }
  };

  const addMealItem = () => {
    const food = data.foods.find(f => f.id === mealItemForm.foodId);
    if (!food) return;
    const cal = food.caloriePerUnit * mealItemForm.amount;
    const prot = food.proteinPerUnit * mealItemForm.amount;
    setMealItems(items => [...items, { foodId: food.id, name: food.name, unit: food.unit, amount: mealItemForm.amount, cal, prot }]);
    setLastCatId(mealItemForm.categoryId);
    setMealItemForm(f => ({ ...f, foodId: "", amount: 100 }));
    setShowAddMealItem(false);
  };

  const endMeal = () => {
    const newMeals = [...allMeals, { meal: currentMeal, items: mealItems }];
    setAllMeals(newMeals);
    if (currentMeal < numMeals) {
      setCurrentMeal(m => m + 1);
      setMealItems([]);
      setMealItemForm(f => ({ ...f, foodId: "", amount: 100 }));
    } else {
      setAllMeals(newMeals); setStep("theme_pick");
    }
  };

  const generateDoc = (trainingDays, nutritionMeals, theme) => {
    const ath = { ...athlete, customFields };
    const html = buildFullHtml(ath, progType, trainingDays, nutritionMeals, targetCal, targetProt, theme || selectedTheme);
    setDocHtml(html);
    setStep("done");
  };

  // ── STEPS ──

  if (step === "athlete") return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: 24 }}>
      <div style={{ maxWidth: 500, margin: "0 auto", paddingTop: 36 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
          <button onClick={onBack} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "7px 13px", color: C.muted, fontSize: 18 }}>←</button>
          <h1 style={{ fontFamily: font, fontSize: 22, color: C.accent }}>🚀 شروع برنامه</h1>
        </div>
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 26 }}>
          <div style={{ fontFamily: font, color: C.accent, fontSize: 15, marginBottom: 20 }}>مشخصات ورزشکار</div>
          <Inp label="نام" value={athlete.name} onChange={v => setAthlete(a => ({ ...a, name: v }))} placeholder="نام کامل" />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Inp label="سن" type="number" value={athlete.age} onChange={v => setAthlete(a => ({ ...a, age: v }))} placeholder="سال" />
            <Inp label="قد (cm)" type="number" value={athlete.height} onChange={v => setAthlete(a => ({ ...a, height: v }))} placeholder="cm" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Inp label="وزن (kg)" type="number" value={athlete.weight} onChange={v => setAthlete(a => ({ ...a, weight: v }))} placeholder="kg" />
            <Inp label="دور کمر (cm)" type="number" value={athlete.waist||""} onChange={v => setAthlete(a => ({ ...a, waist: v }))} placeholder="اختیاری" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Inp label="دور بازو (cm)" type="number" value={athlete.arm||""} onChange={v => setAthlete(a => ({ ...a, arm: v }))} placeholder="اختیاری" />
            <Inp label="دور سینه (cm)" type="number" value={athlete.chest||""} onChange={v => setAthlete(a => ({ ...a, chest: v }))} placeholder="اختیاری" />
          </div>
          <Inp label="هدف" value={athlete.goal} onChange={v => setAthlete(a => ({ ...a, goal: v }))} placeholder="مثل: کاهش وزن، افزایش حجم..." />

          {/* Custom fields */}
          {customFields.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              {customFields.map((f, i) => (
                <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-end", marginBottom: 8 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: C.muted, marginBottom: 5, fontWeight: 600, textTransform: "uppercase" }}>
                      <input value={f.label} onChange={e => { const arr=[...customFields]; arr[i]={...arr[i],label:e.target.value}; setCustomFields(arr); }}
                        placeholder="عنوان فیلد"
                        style={{ background: "transparent", border: "none", borderBottom: `1px solid ${C.border}`, color: C.muted, fontSize: 11, outline: "none", width: "100%" }} />
                    </div>
                    <input value={f.value} onChange={e => { const arr=[...customFields]; arr[i]={...arr[i],value:e.target.value}; setCustomFields(arr); }}
                      placeholder="مقدار..."
                      style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 13px", color: C.text, fontSize: 14, outline: "none" }} />
                  </div>
                  <button onClick={() => setCustomFields(cf => cf.filter((_,j)=>j!==i))}
                    style={{ background: "none", border: "none", color: C.red, fontSize: 18, cursor: "pointer", paddingBottom: 6 }}>✕</button>
                </div>
              ))}
            </div>
          )}
          <button onClick={() => setCustomFields(cf => [...cf, { label: "", value: "" }])}
            style={{ background: "none", border: `1px dashed ${C.border}`, borderRadius: 8, padding: "7px 16px", color: C.muted, fontSize: 12, cursor: "pointer", marginBottom: 16, width: "100%" }}>
            + فیلد اختیاری (مثل: درصد چربی، فشار خون...)
          </button>

          <Btn onClick={() => setStep("type")} disabled={!athlete.name}>ادامه →</Btn>
        </div>
      </div>
    </div>
  );

  if (step === "type") return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: 24, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ maxWidth: 460, width: "100%" }}>
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{ fontFamily: font, fontSize: 26, color: C.accent, marginBottom: 8 }}>خوش آمدی {athlete.name}! 💪</div>
          <div style={{ color: C.muted }}>چه نوع برنامه‌ای می‌خوای؟</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {[{ key: "training", icon: "🏋️", label: "برنامه تمرینی", desc: "طراحی روزهای تمرین با حرکات ورزشی" }, { key: "nutrition", icon: "🥗", label: "برنامه تغذیه", desc: "طراحی وعده‌های غذایی با کالری‌شماری" }, { key: "both", icon: "⚡", label: "هر دو برنامه", desc: "تمرین + تغذیه در یک خروجی کامل" }].map(opt => (
            <button key={opt.key} onClick={() => { setProgType(opt.key); setStep(opt.key === "nutrition" ? "nutrition_setup" : "training_setup"); }}
              style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: 18, textAlign: "right", cursor: "pointer", display: "flex", alignItems: "center", gap: 14, transition: "all 0.2s" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.background = C.accentGlow; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = C.card; }}>
              <span style={{ fontSize: 32 }}>{opt.icon}</span>
              <div><div style={{ fontFamily: font, color: C.accent, fontSize: 15, marginBottom: 3 }}>{opt.label}</div><div style={{ color: C.muted, fontSize: 12 }}>{opt.desc}</div></div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  if (step === "training_setup") return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: 24, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ maxWidth: 380, width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 26 }}>
        <div style={{ fontFamily: font, fontSize: 18, color: C.accent, marginBottom: 22 }}>تعداد روزهای تمرین</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 22 }}>
          {[2, 3, 4, 5, 6].map(n => (
            <button key={n} onClick={() => setNumDays(n)} style={{ background: numDays === n ? `linear-gradient(135deg,${C.accent},${C.accentDim})` : C.surface, color: numDays === n ? "#000" : C.text, border: `1px solid ${numDays === n ? C.accent : C.border}`, borderRadius: 8, padding: "9px 18px", fontWeight: 700, fontSize: 17 }}>{n}</button>
          ))}
        </div>
        <Btn onClick={() => setStep("training_day")}>شروع ← روز اول</Btn>
      </div>
    </div>
  );

  if (step === "training_day") {
    const pickerMoves = (data.movements||[]).filter(m => m.tabId === exForm.tabId);
    return (
      <div style={{ minHeight: "100vh", background: C.bg, padding: 24 }}>
        <div style={{ maxWidth: 700, margin: "0 auto" }}>
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
            <div style={{ fontFamily: font, fontSize: 20, color: C.accent }}>روز {currentDay} از {numDays}</div>
            <div style={{ display: "flex", gap: 5 }}>
              {Array.from({ length: numDays }).map((_, i) => <div key={i} style={{ width: 30, height: 5, borderRadius: 3, background: i < currentDay ? C.accent : C.border }} />)}
            </div>
          </div>

          {/* Added exercises */}
          {dayExercises.length > 0 && (
            <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, overflow: "hidden", marginBottom: 14 }}>
              <div style={{ padding: "10px 16px", borderBottom: `1px solid ${C.border}` }}>
                <span style={{ color: C.muted, fontSize: 12 }}>حرکات اضافه شده ({dayExercises.length})</span>
              </div>
              {dayExercises.map((e, i) => (
                <div key={i} style={{ padding: "10px 16px", borderBottom: i < dayExercises.length - 1 ? `1px solid ${C.border}` : "none", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ background: C.accentGlow, border: `1px solid ${C.accent}44`, color: C.accent, borderRadius: 6, padding: "2px 8px", fontSize: 11 }}>{e.tabName}</span>
                    <span style={{ fontWeight: 600, fontSize: 13 }}>{e.name}</span>
                    <span style={{ color: C.muted, fontSize: 12 }}>
  {e.setType === "superset" ? "🔗 سوپرست" : e.setType === "dropset" ? (e.lastSetDrop ? "📉 دراپ ست آخر" : "📉 دراپ ست") : ""}
  {" "}{e.sets} ست × {e.customReps?.length > 0 ? e.customReps.join("/") : e.reps}
  {e.setType === "superset" && e.superName && <span style={{ color: "#5b9cf6" }}> + {e.superName} ({e.superCustomReps?.length > 0 ? e.superCustomReps.join("/") : e.superReps})</span>}
  {e.setType === "dropset" && e.dropWeights?.length > 0 && <span style={{ color: "#e85d5d" }}> ({e.dropWeights.join(" → ")})</span>}
</span>
                  </div>
                  <button onClick={() => setDayExercises(ex => ex.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: C.red }}>🗑</button>
                </div>
              ))}
            </div>
          )}

          {/* Inline picker */}
          <div style={{ border: `2px dashed ${C.border}`, borderRadius: 14, background: C.surface, marginBottom: 18, overflow: "hidden" }}>
            {/* Tab pills */}
            <div style={{ padding: "12px 14px 8px", display: "flex", gap: 7, flexWrap: "wrap", borderBottom: `1px solid ${C.border}` }}>
              {(data.movementTabs||[]).map(tab => (
                <button key={tab.id} onClick={() => setExForm(f => ({ ...f, tabId: tab.id, movementId: "" }))}
                  style={{ background: exForm.tabId === tab.id ? `linear-gradient(135deg,${C.accent},${C.accentDim})` : C.card, color: exForm.tabId === tab.id ? "#000" : C.mutedLight, border: `1px solid ${exForm.tabId === tab.id ? C.accent : C.border}`, borderRadius: 20, padding: "4px 13px", fontSize: 12, fontWeight: 600 }}>
                  {tab.name}
                </button>
              ))}
            </div>

            {/* Search box */}
            <div style={{ padding: "8px 12px", borderBottom: `1px solid ${C.border}` }}>
              <input value={exForm.search||""} onChange={e => setExForm(f=>({...f,search:e.target.value}))}
                placeholder="🔍 جستجو..."
                style={{ width:"100%", background: C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"7px 12px", color:C.text, fontSize:13, outline:"none" }} />
            </div>
            {/* Grid cards */}
            <div style={{ maxHeight: 260, overflowY: "auto", padding: 10, display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 8 }}>
              {(() => {
                const moves = pickerMoves.filter(m => !exForm.search || m.name.includes(exForm.search) || (m.subCategory||"").includes(exForm.search));
                if (moves.length === 0) return <div style={{ gridColumn:"1/-1", padding:20, textAlign:"center", color:C.muted, fontSize:13 }}>حرکتی پیدا نشد</div>;
                return moves.map(m => (
                  <div key={m.id} onClick={() => setExForm(f => ({ ...f, movementId: m.id }))}
                    style={{ padding: "10px 12px", borderRadius: 10, cursor: "pointer", border: `2px solid ${exForm.movementId===m.id ? C.accent : C.border}`, background: exForm.movementId===m.id ? C.accentGlow : C.card, transition: "all 0.15s", position: "relative" }}>
                    {exForm.movementId === m.id && <div style={{ position:"absolute", top:6, left:8, color:C.accent, fontSize:14 }}>✓</div>}
                    <div style={{ fontWeight: 700, fontSize: 12, color: exForm.movementId===m.id ? C.accent : C.text, marginBottom: 4, lineHeight: 1.4 }}>{m.name}</div>
                    {m.subCategory && <div style={{ fontSize: 10, color: C.muted, background: C.surface, borderRadius:4, padding:"1px 5px", display:"inline-block" }}>{m.subCategory}</div>}
                  </div>
                ));
              })()}
            </div>

            {/* Sets / Reps row — shown when movement selected */}
            {exForm.movementId && (
              <div style={{ padding: "12px 16px", borderTop: `1px solid ${C.border}`, background: C.card }}>

                {/* Set Type Selector */}
                <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
                  {[["normal","معمولی"],["superset","🔗 سوپرست"],["dropset","📉 دراپ ست"]].map(([k,l]) => (
                    <button key={k} onClick={() => setExForm(f => ({ ...f, setType: k }))}
                      style={{ flex: 1, padding: "6px 4px", borderRadius: 8, border: `1px solid ${exForm.setType === k ? C.accent : C.border}`, background: exForm.setType === k ? C.accentGlow : "transparent", color: exForm.setType === k ? C.accent : C.muted, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                      {l}
                    </button>
                  ))}
                </div>

                {/* Sets + reps for main movement */}
                <div style={{ fontSize: 10, color: C.accent, marginBottom: 6, fontWeight: 700 }}>
                  {exForm.setType === "superset" ? "حرکت اول" : exForm.setType === "dropset" ? "حرکت اصلی" : ""}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, color: C.muted, marginBottom: 4, fontWeight: 600 }}>تعداد ست</div>
                    <input type="number" value={exForm.sets} min={1} max={10}
                      onChange={e => {
                        const s = Number(e.target.value);
                        setExForm(f => ({ ...f, sets: s, customReps: f.customMode ? syncCustomReps(s, f.customReps) : f.customReps, superCustomReps: f.superCustomMode ? syncCustomReps(s, f.superCustomReps) : f.superCustomReps }));
                      }}
                      style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 14, outline: "none" }} />
                  </div>
                  <div style={{ paddingTop: 16 }}>
                    <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", userSelect: "none" }}>
                      <div onClick={() => setExForm(f => {
                          const next = !f.customMode;
                          return { ...f, customMode: next, customReps: next ? syncCustomReps(f.sets, f.customReps) : f.customReps };
                        })}
                        style={{ width: 36, height: 20, borderRadius: 10, background: exForm.customMode ? C.accent : C.border, position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
                        <div style={{ position: "absolute", top: 2, left: exForm.customMode ? 18 : 2, width: 16, height: 16, borderRadius: "50%", background: exForm.customMode ? "#000" : C.muted, transition: "left 0.2s" }} />
                      </div>
                      <span style={{ fontSize: 11, color: exForm.customMode ? C.accent : C.muted, whiteSpace: "nowrap" }}>تکرار دستی</span>
                    </label>
                  </div>
                  {!exForm.customMode && (
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 10, color: C.muted, marginBottom: 4, fontWeight: 600 }}>تکرار</div>
                      <input type="number" value={exForm.reps} onChange={e => setExForm(f => ({ ...f, reps: Number(e.target.value) }))}
                        style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 14, outline: "none" }} />
                    </div>
                  )}
                </div>
                {exForm.customMode && (
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, color: C.muted, marginBottom: 6, fontWeight: 600 }}>تکرار هر ست</div>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {exForm.customReps.map((r, i) => (
                        <div key={i} style={{ textAlign: "center" }}>
                          <div style={{ fontSize: 10, color: C.muted, marginBottom: 3 }}>ست {i+1}</div>
                          <input type="number" value={r} onChange={e => { const arr=[...exForm.customReps]; arr[i]=Number(e.target.value); setExForm(f=>({...f,customReps:arr})); }}
                            style={{ width: 52, background: C.surface, border: `1px solid ${C.accent}66`, borderRadius: 7, padding: "6px 8px", color: C.accent, fontSize: 14, outline: "none", textAlign: "center", fontWeight: 700 }} />
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* SUPERSET: second movement */}
                {exForm.setType === "superset" && (
                  <div style={{ marginTop: 12, padding: 12, background: "#5b9cf611", border: `1px solid #5b9cf633`, borderRadius: 10 }}>
                    <div style={{ fontSize: 11, color: C.blue, fontWeight: 700, marginBottom: 8 }}>🔗 حرکت دوم (سوپرست)</div>
                    <div style={{ marginBottom: 8 }}>
                      <div style={{ fontSize: 10, color: C.muted, marginBottom: 4, fontWeight: 600 }}>دسته بندی</div>
                      <select value={exForm.superTabId || exForm.tabId} onChange={e => setExForm(f => ({ ...f, superTabId: e.target.value, superMovementId: "" }))}
                        style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 13, outline: "none", marginBottom: 8 }}>
                        {(data.movementTabs||[]).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                      </select>
                      <select value={exForm.superMovementId} onChange={e => setExForm(f => ({ ...f, superMovementId: e.target.value }))}
                        style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 13, outline: "none" }}>
                        <option value="">انتخاب حرکت...</option>
                        {(data.movements||[]).filter(m => m.tabId === (exForm.superTabId || exForm.tabId)).map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                      </select>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 10, color: C.muted, marginBottom: 4, fontWeight: 600 }}>تکرار حرکت دوم</div>
                        {!exForm.superCustomMode
                          ? <input type="number" value={exForm.superReps} onChange={e => setExForm(f => ({ ...f, superReps: Number(e.target.value) }))}
                              style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 14, outline: "none" }} />
                          : <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                              {exForm.superCustomReps.map((r,i) => (
                                <div key={i} style={{ textAlign: "center" }}>
                                  <div style={{ fontSize: 9, color: C.muted, marginBottom: 2 }}>ست {i+1}</div>
                                  <input type="number" value={r} onChange={e => { const arr=[...exForm.superCustomReps]; arr[i]=Number(e.target.value); setExForm(f=>({...f,superCustomReps:arr})); }}
                                    style={{ width: 48, background: C.surface, border: `1px solid ${C.blue}66`, borderRadius: 7, padding: "5px 6px", color: C.blue, fontSize: 13, outline: "none", textAlign: "center", fontWeight: 700 }} />
                                </div>
                              ))}
                            </div>
                        }
                      </div>
                      <div style={{ paddingTop: 16 }}>
                        <label style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer" }}>
                          <div onClick={() => setExForm(f => { const next=!f.superCustomMode; return {...f, superCustomMode:next, superCustomReps: next ? syncCustomReps(f.sets, f.superCustomReps) : f.superCustomReps}; })}
                            style={{ width: 32, height: 18, borderRadius: 9, background: exForm.superCustomMode ? C.blue : C.border, position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
                            <div style={{ position: "absolute", top: 2, left: exForm.superCustomMode ? 16 : 2, width: 14, height: 14, borderRadius: "50%", background: "#fff", transition: "left 0.2s" }} />
                          </div>
                          <span style={{ fontSize: 10, color: exForm.superCustomMode ? C.blue : C.muted, whiteSpace: "nowrap" }}>دستی</span>
                        </label>
                      </div>
                    </div>
                  </div>
                )}

                {/* DROPSET: weight drops */}
                {exForm.setType === "dropset" && (
                  <div style={{ marginTop: 12, padding: 12, background: "#e85d5d11", border: `1px solid #e85d5d33`, borderRadius: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <div style={{ fontSize: 11, color: C.red, fontWeight: 700 }}>📉 مراحل دراپ</div>
                      <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer" }}>
                        <div onClick={() => setExForm(f => ({ ...f, lastSetDrop: !f.lastSetDrop }))}
                          style={{ width: 34, height: 18, borderRadius: 9, background: exForm.lastSetDrop ? C.red : C.border, position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
                          <div style={{ position: "absolute", top: 2, left: exForm.lastSetDrop ? 18 : 2, width: 14, height: 14, borderRadius: "50%", background: "#fff", transition: "left 0.2s" }} />
                        </div>
                        <span style={{ fontSize: 10, color: exForm.lastSetDrop ? C.red : C.muted, whiteSpace: "nowrap" }}>فقط ست آخر</span>
                      </label>
                    </div>
                    <div style={{ fontSize: 10, color: C.muted, marginBottom: 8 }}>وزن هر مرحله اختیاریه — میتونی فقط تعداد مراحل بذاری</div>
                    {exForm.dropWeights.map((w, i) => (
                      <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
                        <div style={{ fontSize: 11, color: C.red, minWidth: 50 }}>مرحله {i+1}</div>
                        <input value={w} onChange={e => { const arr=[...exForm.dropWeights]; arr[i]=e.target.value; setExForm(f=>({...f,dropWeights:arr})); }}
                          placeholder="اختیاری: مثلاً 80kg"
                          style={{ flex: 1, background: C.surface, border: `1px solid #e85d5d44`, borderRadius: 7, padding: "6px 10px", color: C.text, fontSize: 13, outline: "none" }} />
                        {exForm.dropWeights.length > 1 && (
                          <button onClick={() => setExForm(f => ({ ...f, dropWeights: f.dropWeights.filter((_,j)=>j!==i) }))}
                            style={{ background: "none", border: "none", color: C.red, fontSize: 16, cursor: "pointer" }}>✕</button>
                        )}
                      </div>
                    ))}
                    <button onClick={() => setExForm(f => ({ ...f, dropWeights: [...f.dropWeights, ""] }))}
                      style={{ background: "none", border: `1px dashed #e85d5d66`, borderRadius: 7, padding: "5px 14px", color: C.red, fontSize: 11, cursor: "pointer", marginTop: 4 }}>
                      + افزودن مرحله
                    </button>
                  </div>
                )}

                <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 10, alignItems: "flex-end", marginTop: 12 }}>
                  <div>
                    <div style={{ fontSize: 10, color: C.muted, marginBottom: 4, fontWeight: 600 }}>یادداشت (اختیاری)</div>
                    <input value={exForm.note} onChange={e => setExForm(f => ({ ...f, note: e.target.value }))} placeholder="اختیاری..."
                      style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "7px 10px", color: C.text, fontSize: 13, outline: "none" }} />
                  </div>
                  <Btn onClick={addExercise} style={{ whiteSpace: "nowrap" }}>+ افزودن</Btn>
                </div>
              </div>
            )}
            {!exForm.movementId && pickerMoves.length > 0 && (
              <div style={{ padding: "10px", textAlign: "center", color: C.muted, fontSize: 12 }}>روی یک حرکت کلیک کن</div>
            )}
          </div>

          <Btn onClick={endDay} disabled={dayExercises.length === 0}>
            {currentDay < numDays ? `پایان روز ${currentDay} ← روز ${currentDay + 1}` : "پایان تمرین → تولید برنامه"}
          </Btn>
        </div>
      </div>
    );
  }

  if (step === "nutrition_setup") return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: 24, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ maxWidth: 380, width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 26 }}>
        <div style={{ fontFamily: font, fontSize: 18, color: C.accent, marginBottom: 22 }}>تنظیمات برنامه غذایی</div>
        <Inp label="تعداد وعده‌ها" type="number" value={numMeals} onChange={v => setNumMeals(Number(v))} />
        <Inp label="هدف کالری روزانه (kcal)" type="number" value={targetCal} onChange={v => setTargetCal(Number(v))} />
        <Inp label="هدف پروتئین روزانه (g)" type="number" value={targetProt} onChange={v => setTargetProt(Number(v))} />
        <Btn onClick={() => setStep("nutrition_meal")}>شروع ← وعده اول</Btn>
      </div>
    </div>
  );

  if (step === "nutrition_meal") {
    const mealUsedCal = mealItems.reduce((s, i) => s + i.cal, 0);
    const mealUsedProt = mealItems.reduce((s, i) => s + i.prot, 0);
    const prevCal = allMeals.reduce((s, m) => s + m.items.reduce((ss, i) => ss + i.cal, 0), 0);
    const prevProt = allMeals.reduce((s, m) => s + m.items.reduce((ss, i) => ss + i.prot, 0), 0);
    const totalUsedCal = prevCal + mealUsedCal;
    const totalUsedProt = prevProt + mealUsedProt;
    const catFoodsFiltered = (data.foods||[]).filter(f => f.categoryId === mealItemForm.categoryId);
    return (
      <div style={{ minHeight: "100vh", background: C.bg, padding: 24 }}>
        <div style={{ maxWidth: 680, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22 }}>
            <div style={{ fontFamily: font, fontSize: 20, color: C.accent }}>وعده {currentMeal} از {numMeals}</div>
            <div style={{ display: "flex", gap: 5 }}>
              {Array.from({ length: numMeals }).map((_, i) => <div key={i} style={{ width: 30, height: 5, borderRadius: 3, background: i < currentMeal ? C.accent : C.border }} />)}
            </div>
          </div>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginBottom: 18, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {[{ label: "کالری باقی مانده", value: `${(targetCal - totalUsedCal).toFixed(0)} kcal`, color: (targetCal - totalUsedCal) < 0 ? C.red : C.accent }, { label: "پروتئین باقی مانده", value: `${(targetProt - totalUsedProt).toFixed(1)}g`, color: (targetProt - totalUsedProt) < 0 ? C.red : C.blue }].map(item => (
              <div key={item.label} style={{ textAlign: "center" }}>
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 3 }}>{item.label}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: item.color }}>{item.value}</div>
              </div>
            ))}
          </div>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, overflow: "hidden", marginBottom: 18 }}>
            <div style={{ padding: "12px 18px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between" }}>
              <span style={{ color: C.muted, fontSize: 13 }}>آیتم‌های وعده {currentMeal}</span>
              <Btn size="sm" onClick={() => { setMealItemForm({ categoryId: lastCatId, foodId: "", amount: 100 }); setShowAddMealItem(true); }}>+ افزودن</Btn>
            </div>
            {mealItems.length === 0 ? <div style={{ padding: 28, textAlign: "center", color: C.muted }}>هنوز آیتمی اضافه نشده</div> :
              mealItems.map((item, i) => (
                <div key={i} style={{ padding: "10px 18px", borderBottom: i < mealItems.length - 1 ? `1px solid ${C.border}` : "none", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <span style={{ fontWeight: 600 }}>{item.name}</span>
                    <span style={{ color: C.muted, fontSize: 12, marginRight: 7 }}>{item.amount} {item.unit}</span>
                    <span style={{ color: C.accent, fontSize: 12, marginRight: 5 }}>{item.cal.toFixed(0)} kcal</span>
                    <span style={{ color: C.blue, fontSize: 12 }}>{item.prot.toFixed(1)}g</span>
                  </div>
                  <button onClick={() => setMealItems(items => items.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: C.red }}>🗑</button>
                </div>
              ))}
          </div>
          <Btn onClick={endMeal} disabled={mealItems.length === 0}>
            {currentMeal < numMeals ? `پایان وعده ${currentMeal} ← وعده ${currentMeal + 1}` : "پایان → تولید برنامه"}
          </Btn>
        </div>
        <Modal open={showAddMealItem} onClose={() => setShowAddMealItem(false)} title={`افزودن غذا - وعده ${currentMeal}`}>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 5, fontWeight: 600, textTransform: "uppercase" }}>دسته بندی</div>
            <select value={mealItemForm.categoryId} onChange={e => setMealItemForm(f => ({ ...f, categoryId: e.target.value, foodId: "" }))} style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 13px", color: C.text, fontSize: 14, outline: "none" }}>
              {(data.foodCategories||[]).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 5, fontWeight: 600, textTransform: "uppercase" }}>غذا</div>
            <select value={mealItemForm.foodId} onChange={e => setMealItemForm(f => ({ ...f, foodId: e.target.value }))} style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 13px", color: mealItemForm.foodId ? C.text : C.muted, fontSize: 14, outline: "none" }}>
              <option value="">انتخاب غذا...</option>
              {catFoodsFiltered.map(f => <option key={f.id} value={f.id}>{f.name} ({f.caloriePerUnit} kcal/{f.unit})</option>)}
            </select>
          </div>
          <Inp label={`مقدار (${data.foods.find(f => f.id === mealItemForm.foodId)?.unit || "واحد"})`} type="number" value={mealItemForm.amount} onChange={v => setMealItemForm(f => ({ ...f, amount: Number(v) }))} />
          {mealItemForm.foodId && (() => {
            const food = data.foods.find(f => f.id === mealItemForm.foodId);
            if (!food) return null;
            return <div style={{ background: C.surface, borderRadius: 8, padding: 10, marginBottom: 14, display: "flex", gap: 18 }}>
              <div><span style={{ color: C.muted, fontSize: 12 }}>کالری: </span><span style={{ color: C.accent, fontWeight: 700 }}>{(food.caloriePerUnit * mealItemForm.amount).toFixed(0)} kcal</span></div>
              <div><span style={{ color: C.muted, fontSize: 12 }}>پروتئین: </span><span style={{ color: C.blue, fontWeight: 700 }}>{(food.proteinPerUnit * mealItemForm.amount).toFixed(1)}g</span></div>
            </div>;
          })()}
          <Btn onClick={addMealItem} disabled={!mealItemForm.foodId}>افزودن</Btn>
        </Modal>
      </div>
    );
  }

  // ── DONE ──
  const THEMES = [
    { id: "gold",   label: "طلایی کلاسیک",   bg: "#fdf8ee", accent: "#b8860b", preview: ["#fdf8ee","#e0c97a","#7c5c00"] },
    { id: "dark",   label: "تاریک حرفه‌ای",  bg: "#0f1117", accent: "#e8c96d", preview: ["#181c24","#2a2f40","#e8c96d"] },
    { id: "blue",   label: "آبی مدرن",        bg: "#eff6ff", accent: "#2563eb", preview: ["#eff6ff","#bfdbfe","#1e3a5f"] },
    { id: "green",  label: "سبز انرژی",       bg: "#f0fdf4", accent: "#16a34a", preview: ["#f0fdf4","#bbf7d0","#14532d"] },
    { id: "red",    label: "قرمز قدرت",       bg: "#fff5f5", accent: "#dc2626", preview: ["#fff5f5","#fecaca","#7f1d1d"] },
    { id: "custom", label: "قالب اختصاصی",   bg: "#fff",    accent: "#888",    preview: [], custom: true },
  ];

  if (step === "theme_pick") return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ maxWidth: 500, width: "100%" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontFamily: font, fontSize: 24, color: C.accent, marginBottom: 8 }}>🎨 قالب برنامه رو انتخاب کن</div>
          <div style={{ color: C.muted, fontSize: 13 }}>ظاهر خروجی PDF و تصویر</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 28 }}>
          {THEMES.map(t => {
            const hasCustomImg = t.custom && window._userTemplateImg;
            const noCustomImg  = t.custom && !window._userTemplateImg;
            return (
              <button key={t.id} onClick={() => !noCustomImg && setSelectedTheme(t.id)}
                style={{ background: selectedTheme === t.id ? C.accentGlow : C.card, border: `2px solid ${selectedTheme === t.id ? C.accent : C.border}`, borderRadius: 14, padding: "14px 18px", cursor: noCustomImg ? "not-allowed" : "pointer", display: "flex", alignItems: "center", gap: 14, transition: "all 0.2s", opacity: noCustomImg ? 0.45 : 1 }}>
                {t.custom ? (
                  hasCustomImg
                    ? <img src={window._userTemplateImg} style={{ width: 52, height: 36, objectFit: "cover", borderRadius: 6, border: `1px solid ${C.border}` }} />
                    : <div style={{ width: 52, height: 36, borderRadius: 6, border: `1px dashed ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>🖼</div>
                ) : (
                  <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                    {t.preview.map((c, i) => <div key={i} style={{ width: 18, height: 18, borderRadius: "50%", background: c, border: "1px solid #ffffff22" }} />)}
                  </div>
                )}
                <div>
                  <div style={{ fontFamily: font, fontSize: 14, color: selectedTheme === t.id ? C.accent : C.text, fontWeight: 600 }}>{t.label}</div>
                  {noCustomImg && <div style={{ fontSize: 11, color: C.muted }}>ابتدا از «قالب اختصاصی» آپلود کن</div>}
                </div>
                {selectedTheme === t.id && <div style={{ marginRight: "auto", color: C.accent, fontSize: 18 }}>✓</div>}
              </button>
            );
          })}
        </div>
        <Btn onClick={() => generateDoc(allDays, allMeals, selectedTheme)} style={{ width: "100%" }}>
          ساخت برنامه با این قالب ←
        </Btn>
      </div>
    </div>
  );

  if (step === "done") {
    const downloadAsImage = () => {
      // Build canvas from scratch using the plan data
      // Custom template: use html2canvas on an offscreen div
      if (selectedTheme === "custom" && window._userTemplateImg) {
        const repsDisp = (e) => e.customReps?.length > 0 ? e.customReps.join("/") : String(e.reps);
        const noteDisp = (e) => e.setType === "dropset" && e.dropWeights?.length > 0
          ? "📉 " + e.dropWeights.map((w,i) => w||`مرحله ${i+1}`).join("→") + (e.note ? "|"+e.note : "")
          : (e.note || "-");

        let trainingRows = "";
        if (progType !== "nutrition") {
          allDays.forEach(d => {
            trainingRows += `<div style="margin-bottom:10px">
              <div style="background:#e8c96d22;padding:5px 10px;font-weight:700;font-size:12px;color:#7c5c00;border-radius:4px 4px 0 0">روز ${d.day}</div>
              <table style="width:100%;border-collapse:collapse;font-size:11px">

              ${m.items.map((it,i) => `<tr style="background:${i%2===1?"#fafafa":"#fff"}">
                <td style="padding:4px 8px;font-weight:600">${it.name}</td><td style="padding:4px 8px">${it.amount}</td><td style="padding:4px 8px">${it.unit}</td><td style="padding:4px 8px;color:#b8860b">${it.cal.toFixed(0)}</td><td style="padding:4px 8px;color:#1d4ed8">${it.prot.toFixed(1)}</td>
              </tr>`).join("")}
              </table></div>`;
          });
        }

        const wrapper = document.createElement("div");
        wrapper.style.cssText = "position:fixed;left:-9999px;top:0;width:794px;direction:rtl;font-family:Tahoma,sans-serif;background:#fff";
        wrapper.innerHTML = `

              <div style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px;background:#fdf8ee;border:1px solid #e0c97a;border-radius:8px;padding:10px">
                ${[["نام",athlete.name],["سن",athlete.age],["قد",athlete.height],["وزن",athlete.weight],["هدف",athlete.goal]].map(([l,v])=>`<div style="text-align:center"><div style="font-size:9px;color:#999">${l}</div><div style="font-size:13px;font-weight:700;color:#7c5c00">${v}</div></div>`).join("")}
              </div>
              ${trainingRows}${nutritionRows}

          </div>`;
        document.body.appendChild(wrapper);

        const img = wrapper.querySelector("img");
        img.onload = () => {
          import("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js").then(() => {

              document.body.removeChild(wrapper);
              const link = document.createElement("a");
              link.download = "fitpro-" + athlete.name + ".png";
              link.href = canvas.toDataURL("image/png");
              link.click();
            });
          }).catch(() => {
            document.body.removeChild(wrapper);
            alert("خطا در ساخت تصویر");
          });
        };
        img.onerror = () => img.onload();
        return;
      }

      const canvas = document.createElement("canvas");
      const W = 794; // A4 ~96dpi width
      const scale = 2; // retina
      canvas.width = W * scale;

      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);

      // ── measure total height first ──
      const lineH = 22;
      const pad = 32;
      const tableRowH = 26;
      const headerH = 120;
      const athleteBoxH = 70;

      let totalH = pad + headerH + athleteBoxH + pad;
      if (progType !== "nutrition") {
        allDays.forEach(d => { totalH += 36 + 28 + d.exercises.length * tableRowH + 20; });
      }
      if (progType !== "training") {
        totalH += 50;
        allMeals.forEach(m => { totalH += 36 + 28 + m.items.length * tableRowH + 20; });
      }
      totalH += 60;
      canvas.height = totalH * scale;
      ctx.scale(1, 1); // reset after height calc
      canvas.width = W * scale;
      canvas.height = totalH * scale;
      ctx.scale(scale, scale);

      // ── helpers ──
      const canvasThemes = {
        gold:  { BG:"#ffffff", CARD:"#fdf8ee", BORDER:"#e0c97a", GOLD:"#7c5c00", MUTED:"#888", WHITE:"#1a1a2e", BLUE:"#1d4ed8", HEADER:"#fdf3d0" },
        dark:  { BG:"#0f1117", CARD:"#181c24", BORDER:"#2a2f40", GOLD:"#e8c96d", MUTED:"#6b7280", WHITE:"#d1d5db", BLUE:"#60a5fa", HEADER:"#1e2235" },
        blue:  { BG:"#ffffff", CARD:"#eff6ff", BORDER:"#bfdbfe", GOLD:"#1e3a5f", MUTED:"#6b7280", WHITE:"#1e3a5f", BLUE:"#2563eb", HEADER:"#dbeafe" },
        green: { BG:"#ffffff", CARD:"#f0fdf4", BORDER:"#bbf7d0", GOLD:"#14532d", MUTED:"#6b7280", WHITE:"#166534", BLUE:"#16a34a", HEADER:"#dcfce7" },
        red:   { BG:"#ffffff", CARD:"#fff5f5", BORDER:"#fecaca", GOLD:"#7f1d1d", MUTED:"#6b7280", WHITE:"#7f1d1d", BLUE:"#dc2626", HEADER:"#fee2e2" },
      };
      const ct = canvasThemes[selectedTheme] || canvasThemes.gold;
      const BG=ct.BG, CARD=ct.CARD, BORDER=ct.BORDER, GOLD=ct.GOLD, MUTED=ct.MUTED, WHITE=ct.WHITE, BLUE=ct.BLUE;

      const fillRect = (x, y, w, h, color) => { ctx.fillStyle = color; ctx.fillRect(x, y, w, h); };
      const text = (t, x, y, color, size, align = "right", bold = false) => {
        ctx.fillStyle = color;
        ctx.font = `${bold ? "700" : "400"} ${size}px 'Tahoma', sans-serif`;
        ctx.textAlign = align;
        ctx.fillText(t, x, y);
      };
      const line = (x1, y1, x2, y2, color, lw = 1) => {
        ctx.strokeStyle = color; ctx.lineWidth = lw;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      };
      const gradLine = (x, y, w) => {
        const g = ctx.createLinearGradient(x, y, x + w, y);
        g.addColorStop(0, "transparent"); g.addColorStop(0.5, "#b8860b"); g.addColorStop(1, "transparent");
        ctx.fillStyle = g; ctx.fillRect(x, y, w, 4);
      };
      const roundRect = (x, y, w, h, r, color) => {
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
      };
      // border helper (no fill)
      const strokeRect = (x, y, w, h, r, color) => {
        ctx.strokeStyle = color; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.stroke();
      };

      // ── draw background ──
      fillRect(0, 0, W, totalH, BG);

      let y = pad;

      // top gold line
      gradLine(0, y, W); y += 14;

      // logo

      ctx.fillStyle = GOLD;

      y += 28;

      // athlete box
      roundRect(pad, y, W - pad * 2, 56, 10, CARD);
      const fields = [
        { label: "نام", val: athlete.name },
        { label: "سن", val: athlete.age },
        { label: "قد", val: athlete.height },
        { label: "وزن", val: athlete.weight },
        { label: "هدف", val: athlete.goal },
      ];
      const fw = (W - pad * 2) / fields.length;
      fields.forEach((f, i) => {
        const cx = pad + fw * i + fw / 2;
        text(f.label, cx, y + 18, MUTED, 9, "center");

          // day header

          ctx.beginPath(); ctx.roundRect(pad, y, W - pad * 2, 28, [8, 8, 0, 0]); ctx.fill();
          text(`روز ${d.day}`, W - pad - 10, y + 19, GOLD, 13, "right", true);
          y += 28;

          // table header
          const cols = ["حرکت", "دسته بندی", "ست", "تکرار", "یادداشت"];
          const colW = [(W - pad * 2) * 0.32, (W - pad * 2) * 0.22, (W - pad * 2) * 0.1, (W - pad * 2) * 0.18, (W - pad * 2) * 0.18];
          fillRect(pad, y, W - pad * 2, 24, "#f5eedc");
          let cx2 = W - pad - 8;
          cols.forEach((c, ci) => { text(c, cx2, y + 16, "#a07840", 9, "right"); cx2 -= colW[ci]; });
          y += 24;

          d.exercises.forEach((e, ei) => {
            if (ei % 2 === 1) fillRect(pad, y, W - pad * 2, tableRowH, "#fdf9f0");
            const repsStr = e.customReps?.length > 0 ? e.customReps.join("/") : String(e.reps);
            const nameStr = e.setType === "superset" && e.superName
              ? e.name + " + " + e.superName
              : e.name;
            const noteStr = e.setType === "dropset" && e.dropWeights?.length > 0
              ? (e.dropWeights.join("→") + (e.note ? "|"+e.note : ""))
              : (e.note || "-");
            const vals = [nameStr, e.tabName, String(e.sets), repsStr, noteStr];
            let cx3 = W - pad - 8;
            vals.forEach((v, vi) => {
              const col = vi === 0 ? "#2c2c3e" : vi === 1 ? GOLD : "#666666";
              text(v, cx3, y + 17, col, vi === 0 ? 12 : 11, "right", vi === 0);
              cx3 -= colW[vi];
            });
            y += tableRowH;
          });
          y += 18;
        });
      }

      // ── nutrition ──
      if (progType !== "training" && allMeals.length > 0) {
        const tCal2 = allMeals.reduce((s, m) => s + m.items.reduce((ss, i) => ss + i.cal, 0), 0);
        const tProt2 = allMeals.reduce((s, m) => s + m.items.reduce((ss, i) => ss + i.prot, 0), 0);
        y += 8;
        text("🥗 برنامه تغذیه", W - pad, y, GOLD, 15, "right", true);
        line(pad, y + 6, W - pad, y + 6, BORDER);
        y += 24;

        // macro bar
        roundRect(pad, y, W - pad * 2, 30, 7, CARD);
        text(`هدف: ${targetCal} / ${targetProt}`, W - pad - 10, y + 19, MUTED, 11, "right");
        text(`مصرف: ${tCal2.toFixed(0)} / ${tProt2.toFixed(1)}`, pad + 10, y + 19, GOLD, 11, "left", true);
        y += 42;

        allMeals.forEach(m => {
          const mealCols = ["غذا", "مقدار", "واحد", "کالری", "پروتئین"];
          const mealColW = [(W - pad * 2) * 0.35, (W - pad * 2) * 0.15, (W - pad * 2) * 0.15, (W - pad * 2) * 0.18, (W - pad * 2) * 0.17];
          roundRect(pad, y, W - pad * 2, 30 + m.items.length * tableRowH, 8, CARD);
          ctx.fillStyle = "#e8c96d18";
          ctx.beginPath(); ctx.roundRect(pad, y, W - pad * 2, 28, [8, 8, 0, 0]); ctx.fill();
          text(`وعده ${m.meal}`, W - pad - 10, y + 19, GOLD, 13, "right", true);
          y += 28;
          fillRect(pad, y, W - pad * 2, 24, "#f5eedc");
          let hx = W - pad - 8;
          mealCols.forEach((c, ci) => { text(c, hx, y + 16, "#a07840", 9, "right"); hx -= mealColW[ci]; });
          y += 24;
          m.items.forEach((item, ii) => {
            if (ii % 2 === 1) fillRect(pad, y, W - pad * 2, tableRowH, "#fdf9f0");
            const vals2 = [item.name, String(item.amount), item.unit, item.cal.toFixed(0), item.prot.toFixed(1)];
            let vx = W - pad - 8;
            vals2.forEach((v, vi) => {
              const col = vi === 0 ? "#2c2c3e" : vi === 3 ? GOLD : vi === 4 ? BLUE : "#666666";
              text(v, vx, y + 17, col, vi === 0 ? 12 : 11, "right", vi === 0);
              vx -= mealColW[vi];
            });
            y += tableRowH;
          });
          y += 18;
        });
      }

      // bottom line + footer
      y += 8;
      gradLine(0, y, W); y += 14;
      text("FIT PRO  |  " + (athlete.fullName || athlete.name), W / 2, y + 14, MUTED, 10, "center");

      // ── download ──
      const link = document.createElement("a");
      link.download = `fitpro-${athlete.name}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    };

    return (
      <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", padding: 24 }}>
        <div style={{ width: "100%", maxWidth: 860 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div>
              <div style={{ fontFamily: font, fontSize: 22, color: C.accent }}>🏆 برنامه آماده شد!</div>
              <div style={{ color: C.muted, fontSize: 13, marginTop: 4 }}>پیش‌نمایش در پایین</div>

            </div>
          </div>
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden", height: 620 }}>
            <iframe srcDoc={docHtml} style={{ width: "100%", height: "100%", border: "none" }} title="fitness-plan" />
          </div>
        </div>
      </div>
    );
  }

  return null;
};

// ── migrateIfNeeded: one-time migration for old users missing new tabs ──────────
// Logic: if a tab id (e.g. t7=ساق, t8=کاردیو) doesn't exist in user's tabs AT ALL
// (meaning they never had it, not that they deleted it), add it with its movements.
// We track which migrations ran via user's "migrations" field in Firebase.
function migrateIfNeeded(userData, username) {
  const db = window._firebaseDB;
  const current = userData || {};
  const doneMigrations = current.migrations || {};
  const fresh = defaultData();

  const pendingTabs = fresh.movementTabs.filter(t =>
    !doneMigrations["tab_" + t.id] &&
    !(current.movementTabs || []).some(ut => ut.id === t.id)
  );
  const pendingFoodCats = fresh.foodCategories.filter(c =>
    !doneMigrations["fcat_" + c.id] &&
    !(current.foodCategories || []).some(uc => uc.id === c.id)
  );

  if (pendingTabs.length === 0 && pendingFoodCats.length === 0) {
    return Promise.resolve(current);
  }

  const newTabs = [...(current.movementTabs || []), ...pendingTabs];
  const newMovements = [...(current.movements || [])];
  pendingTabs.forEach(tab => {
    fresh.movements.filter(m => m.tabId === tab.id).forEach(m => newMovements.push(m));
  });

  const newFoodCats = [...(current.foodCategories || []), ...pendingFoodCats];
  const newFoods = [...(current.foods || [])];
  pendingFoodCats.forEach(cat => {
    fresh.foods.filter(f => f.categoryId === cat.id).forEach(f => newFoods.push(f));
  });

  const newMigrations = { ...doneMigrations };
  pendingTabs.forEach(t => { newMigrations["tab_" + t.id] = true; });
  pendingFoodCats.forEach(c => { newMigrations["fcat_" + c.id] = true; });

  const merged = { ...current, movementTabs: newTabs, movements: newMovements, foodCategories: newFoodCats, foods: newFoods, migrations: newMigrations };

  if (db && username) {
    db.ref("fitpro_users/" + username + "/data").set(merged);
  }
  return Promise.resolve(merged);
}

    const u = username.trim().toLowerCase().replace(/[^a-z0-9_]/g, "");
    if (!u || password.length < 4) { setError("نام کاربری معتبر و پسورد حداقل ۴ کاراکتر وارد کن"); return; }
    if (mode === "register" && !fullName.trim()) { setError("اسم و فامیل رو وارد کن"); return; }
    setLoading(true); setError("");
    const db = window._firebaseDB;

    // Admin hardcoded
    if (u === "mehdi" && password === "1234321") {
      onLogin(u, null, true);
      setLoading(false); return;
    }

    const userRef = db.ref("fitpro_users/" + u);
    const snap = await userRef.once("value");
    const existing = snap.val();

    if (mode === "login") {
      if (!existing) { setError("این نام کاربری وجود نداره"); setLoading(false); return; }
      if (existing.password !== password) { setError("پسورد اشتباهه"); setLoading(false); return; }
      if (existing.status === "pending")  { setError("⏳ حساب شما هنوز تایید نشده، منتظر تایید ادمین باش"); setLoading(false); return; }
      if (existing.status === "disabled") { setError("🚫 حساب شما غیرفعال شده، با ادمین تماس بگیر"); setLoading(false); return; }
      migrateIfNeeded(existing.data, u).then(migratedData => {
        onLogin(u, migratedData, false, existing.fullName || u);
      });
    } else {
      if (existing) { setError("این نام کاربری قبلاً ثبت شده"); setLoading(false); return; }
      const newData = defaultData();
      await userRef.set({ password, fullName: fullName.trim(), data: newData, status: "pending", createdAt: Date.now() });
      setRegistered(true);
    }
    setLoading(false);
  };

  if (registered) return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: `radial-gradient(ellipse at 50% 0%,${C.accentGlow},transparent 70%),${C.bg}`, padding: 24 }}>
      <div style={{ fontSize: 60, marginBottom: 20 }}>⏳</div>
      <div style={{ fontFamily: font, fontSize: 22, color: C.accent, marginBottom: 12 }}>ثبت‌نام انجام شد!</div>
      <div style={{ color: C.muted, fontSize: 14, textAlign: "center", maxWidth: 320, lineHeight: 1.8 }}>
        حساب <span style={{ color: C.accent, fontWeight: 700 }}>@{username}</span> در انتظار تایید ادمینه.
        بعد از تایید می‌تونی وارد بشی.
      </div>
      <button onClick={() => { setRegistered(false); setMode("login"); }} style={{ marginTop: 28, background: "none", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 20px", color: C.accent, fontSize: 13, cursor: "pointer" }}>
        رفتن به صفحه ورود
      </button>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: `radial-gradient(ellipse at 50% 0%,${C.accentGlow},transparent 70%),${C.bg}`, padding: 24 }}>
      <div style={{ width: 96, height: 96, borderRadius: "50%", border: `2px solid ${C.accent}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 40, marginBottom: 24, boxShadow: `0 0 40px ${C.accentGlow}` }}>💪</div>
      <h1 style={{ fontFamily: font, fontSize: 36, fontWeight: 900, color: C.accent, letterSpacing: 3, marginBottom: 6 }}>FIT PRO</h1>
      <p style={{ color: C.muted, fontSize: 12, marginBottom: 36, letterSpacing: 3, textTransform: "uppercase" }}>برنامه ریز ورزشی و تغذیه</p>

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 18, padding: 28, width: "100%", maxWidth: 380 }}>
        <div style={{ display: "flex", background: C.surface, borderRadius: 10, padding: 4, marginBottom: 24, gap: 4 }}>
          {[["login","ورود"],["register","ثبت‌نام"]].map(([k,l]) => (
            <button key={k} onClick={() => { setMode(k); setError(""); }}
              style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "none", fontWeight: 700, fontSize: 13, cursor: "pointer", transition: "all 0.2s",
                background: mode === k ? `linear-gradient(135deg,${C.accent},${C.accentDim})` : "transparent",
                color: mode === k ? "#000" : C.muted }}>
              {l}
            </button>
          ))}
        </div>

        <Inp label="نام کاربری (انگلیسی)" value={username} onChange={v => setUsername(v.toLowerCase().replace(/[^a-z0-9_]/g,""))} placeholder="مثلاً: ali_coach" />
        {mode === "register" && <div>
          <Inp label="اسم و فامیل (امضای پایین برنامه)" value={fullName} onChange={setFullName} placeholder="مثلاً: علی احمدی" />
          <div style={{ fontSize: 11, color: C.muted, marginTop: -10, marginBottom: 14 }}>این اسم پایین برنامه‌های ورزشی که چاپ می‌کنی نوشته میشه</div>
        </div>}
        <Inp label="پسورد" type="password" value={password} onChange={setPassword} placeholder="حداقل ۴ کاراکتر" />

        {error && <div style={{ background: "#e85d5d22", border: "1px solid #e85d5d44", borderRadius: 8, padding: "8px 12px", color: C.red, fontSize: 12, marginBottom: 14 }}>{error}</div>}

        <Btn onClick={handle} disabled={loading} style={{ width: "100%" }}>
          {loading ? "⏳ لطفاً صبر کن..." : mode === "login" ? "ورود ←" : "ثبت‌نام ←"}
        </Btn>
      </div>
    </div>
  );
};

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [authUser, setAuthUser] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [page, setPage] = useState("splash");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saveStatus, setSaveStatus] = useState("");

  useEffect(() => {
    const db = window._firebaseDB;
    if (!db) { setLoading(false); return; }
    const saved = localStorage.getItem("fitpro_user");
    if (saved) {
      const { username, admin } = JSON.parse(saved);
      if (admin) { setAuthUser(username); setIsAdmin(true); setLoading(false); return; }
      db.ref("fitpro_users/" + username).once("value").then(snap => {
        const val = snap.val();
        if (val && val.status === "active") {
          migrateIfNeeded(val.data, username).then(migratedData => {
            setAuthUser(username);
            setData(migratedData);
            window._userFullName = val.fullName || username;
            window._userTemplateImg = val.templateImg || null;
            setLoading(false);
          });
          return;
        } else {
          localStorage.removeItem("fitpro_user");
        }
        setLoading(false);
      }).catch(() => setLoading(false));
    } else {
      setLoading(false);
    }
  }, []);

  const handleLogin = (username, userData, admin = false, fullName = "") => {
    localStorage.setItem("fitpro_user", JSON.stringify({ username, admin }));
    window._userFullName = fullName;
    window._userTemplateImg = null;
    setAuthUser(username);
    setIsAdmin(admin);
    setData(userData);
    setPage("splash");
  };

  const handleLogout = () => {
    localStorage.removeItem("fitpro_user");
    setAuthUser(null); setIsAdmin(false); setData(null); setPage("splash");
  };

  const updateData = (fn) => {
    setData(d => {
      const next = typeof fn === "function" ? fn(d) : fn;
      const db = window._firebaseDB;
      if (db && authUser && !isAdmin) {
        setSaveStatus("saving");
        db.ref("fitpro_users/" + authUser + "/data").set(next)
          .then(() => { setSaveStatus("saved"); setTimeout(() => setSaveStatus(""), 2000); })
          .catch(() => setSaveStatus(""));
      }
      return next;
    });
  };

  if (loading) return (
    <div style={{ minHeight: "100vh", background: "#0a0c10", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20 }}>
      <div style={{ fontSize: 48 }}>💪</div>
      <div style={{ color: "#e8c96d", fontFamily: "'Cinzel',serif", fontSize: 20, letterSpacing: 3 }}>FIT PRO</div>
      <div style={{ color: "#7a8099", fontSize: 13 }}>در حال بارگذاری...</div>
    </div>
  );

  if (!authUser) return (
    <>
      <style>{globalStyles}</style>
      <AuthPage onLogin={handleLogin} />
    </>
  );

  if (isAdmin) return (
    <>
      <style>{globalStyles}</style>
      <AdminPanel onLogout={handleLogout} />
    </>
  );

  return (
    <>
      <style>{globalStyles}</style>
      {saveStatus && (
        <div style={{ position: "fixed", top: 12, left: "50%", transform: "translateX(-50%)", background: saveStatus === "saved" ? "#4ecb71" : "#e8c96d", color: "#000", borderRadius: 20, padding: "5px 16px", fontSize: 12, fontWeight: 700, zIndex: 9999, transition: "all 0.3s" }}>
          {saveStatus === "saving" ? "⏳ ذخیره..." : "✓ ذخیره شد"}
        </div>
      )}
      {page === "splash" && <Splash onEnter={setPage} username={authUser} onLogout={handleLogout} />}
      {page === "profile" && <ProfilePage username={authUser} onBack={() => setPage("splash")} />}
      {page === "movements" && <MovementsPage data={data} setData={updateData} onBack={() => setPage("splash")} />}
      {page === "foods" && <FoodsPage data={data} setData={updateData} onBack={() => setPage("splash")} />}
      {page === "program" && <ProgramWizard data={data} onBack={() => setPage("splash")} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
